<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Sip Cycle | Staff Terminal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root {
            --primary: #00f2fe;
            --success: #10b981;
            --error: #ef4444;
            --dark: #070b14;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .terminal { width: 100%; max-width: 400px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-size: 1.2rem; text-align: center; letter-spacing: 2px; color: var(--primary); margin-bottom: 20px; }
        
        .mode-switch { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 10px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; font-weight: 600; cursor: pointer; }
        .mode-btn.active { background: var(--primary); color: var(--dark); }

        .input-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; opacity: 0.6; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; font-size: 1rem; box-sizing: border-box; }
        
        .scan-trigger { position: absolute; right: 5px; top: 25px; background: var(--primary); color: var(--dark); border: none; padding: 8px 12px; border-radius: 8px; font-weight: 800; font-size: 0.7rem; cursor: pointer; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 15px; display: none; border: 2px solid var(--primary); }

        .btn-action { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: var(--dark); font-weight: 800; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        
        #status { margin-top: 20px; padding: 20px; border-radius: 15px; text-align: center; display: none; }
        .status-success { background: rgba(16, 185, 129, 0.2); border: 1px solid var(--success); color: var(--success); }
        .status-error { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--error); color: var(--error); }
        
        .balance-large { font-size: 3rem; font-weight: 800; margin: 10px 0; }
        .info-text { font-size: 0.7rem; opacity: 0.5; margin-top: 20px; text-align: center; line-height: 1.4; }
    </style>
</head>
<body>
    <div class='terminal'>
        <h1>STAFF TERMINAL</h1>
        
        <div class='mode-switch'>
            <button class='mode-btn active' id='pay-btn' onclick='setMode("pay")'>PAYMENT</button>
            <button class='mode-btn' id='reg-btn' onclick='setMode("reg")'>REGISTER</button>
        </div>

        <div id="reader"></div>

        <div class='input-group'>
            <label>Card ID / QR Code</label>
            <input type='text' id='cardId' placeholder='Tap card or scan QR...'>
            <button class="scan-trigger" onclick="startScanner()">SCAN QR</button>
        </div>

        <div id='payForm'>
            <div class='input-group'>
                <label>Refill Size</label>
                <input type='text' value='20 Litres (150/-)' readonly>
            </div>
            <button class='btn-action' onclick='processPayment()'>TAP TO PAY</button>
        </div>

        <div id='regForm' style='display:none;'>
            <div class='input-group'><label>Customer Name</label><input type='text' id='name'></div>
            <div class='input-group'><label>Phone Number</label><input type='tel' id='phone' placeholder='254...'></div>
            <div class='input-group'><label>Initial Deposit (KES)</label><input type='number' id='deposit' value='1000'></div>
            <button class='btn-action' onclick='processRegistration()'>LINK & NOTIFY</button>
        </div>

        <div id='status'></div>
    </div>

    <script>
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxr-HhV_Vp5t7Lq9N5mN4j_u0Z_u-1q-1q-1q-1q/exec";
        let html5QrCode;

        function setMode(mode) {
            document.getElementById("pay-btn").classList.toggle("active", mode === "pay");
            document.getElementById("reg-btn").classList.toggle("active", mode === "reg");
            document.getElementById("payForm").style.display = mode === "pay" ? "block" : "none";
            document.getElementById("regForm").style.display = mode === "reg" ? "block" : "none";
            document.getElementById("status").style.display = "none";
        }

        function startScanner() {
            const reader = document.getElementById("reader");
            reader.style.display = "block";
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    document.getElementById("cardId").value = decodedText;
                    stopScanner();
                },
                (errorMessage) => {}
            ).catch(err => alert("Camera error: " + err));
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById("reader").style.display = "none";
                });
            }
        }

        async function processPayment() {
            const cardId = document.getElementById("cardId").value.trim();
            if(!cardId) return alert("Please scan a card first!");
            
            showStatus("Processing...", "");
            
            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "payment", cardId: cardId })
                });
                const res = await response.json();
                
                if(res.status === "paid") {
                    showStatus("PAYMENT SUCCESS", "status-success", "NEW BALANCE: " + res.balance + "/-");
                } else {
                    showStatus("CARD NOT FOUND", "status-error", "Please register this card first.");
                }
            } catch (e) {
                showStatus("OFFLINE MODE", "status-error", "Check connection.");
            }
        }

        async function processRegistration() {
            const data = {
                action: "register",
                cardId: document.getElementById("cardId").value,
                name: document.getElementById("name").value,
                phone: document.getElementById("phone").value,
                deposit: document.getElementById("deposit").value
            };

            if(!data.cardId || !data.name) return alert("Fill all fields!");

            showStatus("Registering...", "");

            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    body: JSON.stringify(data)
                });
                showStatus("REGISTRATION COMPLETE", "status-success", "Card linked.");
            } catch (e) {
                showStatus("ERROR", "status-error", "Failed.");
            }
        }

        function showStatus(title, className, htmlContent = "") {
            const s = document.getElementById("status");
            s.style.display = "block";
            s.className = className;
            s.innerHTML = "<strong>" + title + "</strong><br>" + htmlContent;
        }
    </script>
</body>
</html>
