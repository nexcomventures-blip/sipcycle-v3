<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Sip Cycle | Terminal</title>
    <meta name='apple-mobile-web-app-capable' content='yes'>
    <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --dark: #070b14;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .terminal-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 3rem 2rem;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.1);
        }
        .icon { font-size: 5rem; margin-bottom: 1.5rem; }
        .status { font-weight: 800; font-size: 1.5rem; margin-top: 1rem; color: var(--primary); }
        .btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            color: var(--dark);
            padding: 1.2rem 2rem;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 2rem;
            width: 100%;
            cursor: pointer;
        }
        .ios-hint {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #94a3b8;
            padding: 1rem;
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class='terminal-card'>
        <div style='font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5; margin-bottom: 2rem;'>SIP CYCLE TERMINAL v1.1</div>
        
        <div id='ui-nfc'>
            <div class='icon'>📡</div>
            <div id='status' class='status'>Tap to Scan</div>
            <button id='scanBtn' class='btn'>SCAN CLIENT CARD</button>
        </div>

        <div class='ios-hint'>
            <b>iPhone Tip:</b> Apple restricts NFC to native apps only. For iPhones, use your <b>Camera</b> to scan the Card QR code, or use an Android for the tap-to-pay experience.
        </div>
    </div>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const status = document.getElementById('status');

        scanBtn.addEventListener('click', async () => {
            if (!('NDEFReader' in window)) {
                alert('NFC Scanning is only available on Chrome for Android. On iPhone, please scan the QR code on the card instead.');
                return;
            }

            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                status.textContent = 'Hold Card Near Phone';
                scanBtn.style.opacity = '0.5';

                ndef.addEventListener('reading', ({ serialNumber }) => {
                    alert('PAYMENT VERIFIED! Card ID: ' + serialNumber);
                    status.textContent = 'SUCCESS ✅';
                    setTimeout(() => {
                        status.textContent = 'Ready for Next Tap';
                        scanBtn.style.opacity = '1';
                    }, 2000);
                });
            } catch (error) {
                alert('Scanning failed. Make sure NFC is enabled in your settings.');
            }
        });
    </script>
</body>
</html>
