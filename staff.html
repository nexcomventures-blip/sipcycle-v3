<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Sip Cycle | Terminal</title>
    <script src='https://unpkg.com/html5-qrcode'></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --dark: #070b14;
            --glass: rgba(255, 255, 255, 0.05);
            --success: #10b981;
            --warning: #facc15;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--dark);
            color: white;
            margin: 0;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header { width: 100%; display: flex; justify-content: space-between; margin-bottom: 2rem; opacity: 0.6; font-size: 0.8rem; letter-spacing: 2px; }
        
        .terminal-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 32px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .mode-toggle {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: white;
            font-weight: 800;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .mode-btn.active { background: var(--primary); color: var(--dark); }

        #reader { width: 100%; border-radius: 16px; overflow: hidden; margin-bottom: 1rem; border: none !important; }
        
        .status-box { margin-top: 1rem; padding: 1.5rem; border-radius: 20px; background: rgba(255,255,255,0.02); }
        .price-badge { font-size: 2rem; font-weight: 800; color: var(--primary); margin: 0.5rem 0; }
        
        .input-group { text-align: left; margin-bottom: 1rem; }
        .input-group label { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .input-group input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; padding: 12px; color: white; font-family: inherit;
        }

        .btn-action {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none; color: var(--dark); padding: 1.2rem; border-radius: 16px;
            font-weight: 800; width: 100%; margin-top: 1rem; cursor: pointer;
        }

        #overlay {
            position: fixed; inset: 0; display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
            text-align: center; color: var(--dark);
        }
        .overlay-content { padding: 3rem; border-radius: 40px; }
        .balance-label { font-size: 0.9rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .balance-value { font-size: 3.5rem; font-weight: 800; }
    </style>
</head>
<body>
    <!-- SUCCESS / ERROR OVERLAY -->
    <div id='overlay'>
        <div class='overlay-content'>
            <div id='overlay-icon' style='font-size: 5rem;'>✅</div>
            <div id='overlay-msg' style='font-size: 1.5rem; font-weight: 800;'>PAYMENT SUCCESS</div>
            <div id='balance-container' style='margin-top: 20px;'>
                <div class='balance-label'>New Balance</div>
                <div id='overlay-balance' class='balance-value'>0/-</div>
            </div>
            <div id='notif-status' style='margin-top: 20px; font-weight: 600; opacity: 0.7;'>Notification Sent 📱</div>
        </div>
    </div>

    <div class='header'>
        <span>SIP CYCLE</span>
        <span>v3.0 SMART</span>
    </div>

    <div class='terminal-card'>
        <div class='mode-toggle'>
            <button id='btnPay' class='mode-btn active'>PAYMENT</button>
            <button id='btnReg' class='mode-btn'>REGISTER</button>
        </div>

        <div id='reader'></div>

        <div id='ui-pay'>
            <div class='status-box'>
                <div style='opacity: 0.6; font-size: 0.8rem;'>20L AUTO-DEDUCT</div>
                <div class='price-badge'>150/-</div>
            </div>
            <button id='startScan' class='btn-action'>SCAN CARD / TAP</button>
        </div>

        <div id='ui-reg' style='display:none;'>
            <div class='input-group'><label>Name</label><input type='text' id='regName'></div>
            <div class='input-group'><label>Phone (for SMS)</label><input type='tel' id='regPhone' placeholder='2547...'></div>
            <div class='input-group'><label>Initial Deposit</label><input type='number' id='regDeposit' value='1000'></div>
            <div class='input-group'><label>Card ID</label><input type='text' id='regCardId' readonly></div>
            <button id='saveBtn' class='btn-action'>LINK & NOTIFY</button>
        </div>
    </div>

    <script>
        // CONFIG: Replace with your actual Google Apps Script Web App URL
        const BACKEND_URL = 'https://script.google.com/macros/s/REPLACE_WITH_YOUR_ID/exec';

        let currentMode = 'pay';
        const html5QrCode = new Html5Qrcode('reader');

        document.getElementById('btnPay').onclick = () => { currentMode = 'pay'; switchUI('pay'); };
        document.getElementById('btnReg').onclick = () => { currentMode = 'reg'; switchUI('reg'); };

        function switchUI(m) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.id.toLowerCase().includes(m)));
            document.getElementById('ui-pay').style.display = m === 'pay' ? 'block' : 'none';
            document.getElementById('ui-reg').style.display = m === 'reg' ? 'block' : 'none';
        }

        async function startCamera() {
            try {
                await html5QrCode.start({ facingMode: 'environment' }, { fps: 10, qrbox: 250 }, (txt) => {
                    processId(txt);
                    html5QrCode.stop();
                });
            } catch (err) { alert('Camera access denied'); }
        }

        document.getElementById('startScan').onclick = startCamera;

        if ('NDEFReader' in window) {
            const ndef = new NDEFReader();
            ndef.scan().then(() => { ndef.onreading = e => processId(e.serialNumber); });
        }

        async function processId(id) {
            if (currentMode === 'reg') {
                document.getElementById('regCardId').value = id;
                return;
            }

            // Payment Processing
            showOverlay('🔄', 'PROCESSING...', '#facc15');
            
            try {
                // In a real setup, we would fetch(BACKEND_URL, ...)
                // Mocking the response for Dickson to see the UI
                setTimeout(() => {
                    const mockBalance = 850; // Current - 150
                    showOverlay('✅', 'PAYMENT DONE', '#10b981', mockBalance);
                    setTimeout(hideOverlay, 3000);
                }, 1500);
            } catch (err) {
                showOverlay('❌', 'SYSTEM ERROR', '#ef4444');
                setTimeout(hideOverlay, 3000);
            }
        }

        function showOverlay(icon, msg, color, balance = null) {
            const o = document.getElementById('overlay');
            o.style.display = 'flex';
            o.style.backgroundColor = color;
            document.getElementById('overlay-icon').textContent = icon;
            document.getElementById('overlay-msg').textContent = msg;
            
            const bCont = document.getElementById('balance-container');
            if (balance !== null) {
                bCont.style.display = 'block';
                document.getElementById('overlay-balance').textContent = balance + '/-';
            } else {
                bCont.style.display = 'none';
            }
        }

        function hideOverlay() { document.getElementById('overlay').style.display = 'none'; }

        document.getElementById('saveBtn').onclick = () => {
            alert('LINKED: Client registered and Welcome SMS sent!');
        };
    </script>
</body>
</html>
